<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Petal Note</title>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="index.css">
</head>

<body>

    <!-- ===== 背景 ===== -->
    <div class="background"></div>


    <!-- ===== ハンバーガーボタン ===== -->
    <button id="menuBtn" class="menu-btn">
        ☰
    </button>


    <!-- ===== オーバーレイ ===== -->
    <div id="overlay"></div>


    <!-- ===== サイドメニュー ===== -->
    <nav id="sideMenu">

    <div class="menu-header">

        <h2>Petal Note</h2>

    </div>

    <a href="index.html">Home</a>
    <a href="record.html">Record</a>
    <a href="stamp.html">Stamp Book</a>

    <button id="closeBtn" class="close-btn">
        CLOSE
    </button>

</nav>



    <!-- ===== メイン ===== -->

    <main class="wrapper">

        <section class="phone">

            <img src="images/rogo1.PNG"
                alt="Petal Note"
                class="logo">


            <p class="catch">

                花を見つけるたび、<br>
                あなたの小さな花図鑑が育っていく。

            </p>

        </section>

    </main>



    <script>

        const menu = document.getElementById("sideMenu");
const button = document.getElementById("menuBtn");
const overlay = document.getElementById("overlay");
const closeBtn = document.getElementById("closeBtn");


button.addEventListener("click", () => {

    menu.classList.add("open");
    overlay.classList.add("show");

    button.style.display = "none";

});


closeBtn.addEventListener("click", () => {

    menu.classList.remove("open");
    overlay.classList.remove("show");

    button.style.display = "block";

});


overlay.addEventListener("click", () => {

    menu.classList.remove("open");
    overlay.classList.remove("show");

    button.style.display = "block";

});

    </script>

</body>

</html>
