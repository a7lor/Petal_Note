<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Petal Note | Flower Get</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="get.css">


</head>

<body>


<!-- ===== 背景 ===== -->

<div class="background"></div>


<!-- ===== メニューボタン ===== -->

<button id="menuBtn" class="menu-btn">
☰
</button>


<!-- ===== オーバーレイ ===== -->

<div id="overlay"></div>



<!-- ===== サイドメニュー ===== -->


<nav id="sideMenu">

<div class="menu-header">
<h2>Petal Note</h2>

</div>



<a href="index.html">Home</a>
<a href="record.html">Record</a>
<a href="stamp.html">Stamp Book</a>
<a href="mypage.html">My Page</a>



<button id="closeBtn" class="close-btn">

CLOSE

</button>



</nav>


<!-- ===== メイン ===== -->


<main class="container">

<div class="sparkle">
✨
</div>

<h1 class="title">
Flower Get!
</h1>



<div class="flower-card">


<img id="flowerImage" src="" width="200">



<h2 id="flowerTitle"></h2>



<p class="message">

図鑑に追加されました♪

</p>



</div>






<button class="stamp-btn" onclick="goStamp()">


スタンプ帳を見る


</button>





</main>






<script src="get.js"></script>





<script>


const menu =
document.getElementById("sideMenu");


const button =
document.getElementById("menuBtn");


const overlay =
document.getElementById("overlay");


const closeBtn =
document.getElementById("closeBtn");




button.addEventListener("click",()=>{


menu.classList.add("open");


overlay.classList.add("show");


button.style.display="none";


});





closeBtn.addEventListener("click",()=>{


menu.classList.remove("open");


overlay.classList.remove("show");


button.style.display="block";


});





overlay.addEventListener("click",()=>{


menu.classList.remove("open");


overlay.classList.remove("show");


button.style.display="block";


});



</script>



</body>

</html>
